[custom]

; --- 核心设置 ---
enable_rule_generator=true
overwrite_original_rules=true

; --- 1. 策略组设置 (在这里决定你在 Clash 界面看到什么) ---

; 主出口（单节点用户只需这一个）
custom_proxy_group=🚀 节点选择`select`.*`[]DIRECT

; EMBY 专用组 (放在靠前位置，方便切换)
custom_proxy_group=EMBY直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=EMBY国外`select`[]🚀 节点选择`[]DIRECT

; 基础功能组
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT


; --- 2. 规则分流设置 (在这里决定什么流量走哪个组) ---

; EMBY 规则 (关联到上面的 EMBY 组)
ruleset=EMBY直连,https://raw.githubusercontent.com/s949492225/openwrt/refs/heads/main/sntp.list
ruleset=EMBY国外,https://raw.githubusercontent.com/s949492225/openwrt/refs/heads/main/uhd.list

; 国外平台：全部合并到 [🚀 节点选择] (不再单独显示，减少乱七八糟的分组)
